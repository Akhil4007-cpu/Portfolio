    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>

  <body>
    <div id="root"></div>

    <script type="module">
      import React, { useEffect, useMemo, useRef, useState } from 'https://esm.sh/react@18.3.1?dev=false';
      import ReactDOM from 'https://esm.sh/react-dom@18.3.1/client?dev=false';
      import htm from 'https://esm.sh/htm@3.1.1?dev=false';

      const html = htm.bind(React.createElement);

      function cn() {
        return Array.from(arguments).filter(Boolean).join(' ');
      }

      function isExternalHref(href) {
        return typeof href === 'string' && /^https?:\/\//i.test(href);
      }

      function useRevealOnScroll() {
        useEffect(() => {
          const nodes = Array.from(document.querySelectorAll('.reveal'));
          const observed = new Set();
          const io = new IntersectionObserver(
            (entries) => {
              for (const e of entries) {
                if (e.isIntersecting) e.target.classList.add('is-visible');
              }
            },
            { threshold: 0.14, rootMargin: '0px 0px -80px 0px' }
          );

          function observeAll() {
            const all = Array.from(document.querySelectorAll('.reveal'));
            for (const n of all) {
              if (!observed.has(n)) {
                observed.add(n);
                io.observe(n);
              }
            }
          }

          nodes.forEach((n) => {
            observed.add(n);
            io.observe(n);
          });

          const mo = new MutationObserver(() => observeAll());
          mo.observe(document.body, { childList: true, subtree: true });

          return () => {
            mo.disconnect();
            io.disconnect();
          };
        }, []);
      }

      function useTheme() {
        const [theme, setTheme] = useState(() => {
          try {
            const saved = localStorage.getItem('theme');
            if (saved === 'light' || saved === 'dark') return saved;
          } catch (e) {}
          return document.documentElement.classList.contains('dark') ? 'dark' : 'light';
        });

        useEffect(() => {
          const isDark = theme === 'dark';
          document.documentElement.classList.toggle('dark', isDark);
          try { localStorage.setItem('theme', theme); } catch (e) {}
        }, [theme]);

        return { theme, setTheme };
      }

      function Icon(props) {
        const { name, className } = props;
        const common = { className: cn('inline-block', className), fill: 'none', stroke: 'currentColor', strokeWidth: '2', strokeLinecap: 'round', strokeLinejoin: 'round' };
        switch (name) {
          case 'arrow':
            return html`<svg ${common} viewBox="0 0 24 24"><path d="M7 17L17 7"/><path d="M7 7h10v10"/></svg>`;
          case 'sun':
            return html`<svg ${common} viewBox="0 0 24 24"><path d="M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12Z"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="M4.93 4.93 6.34 6.34"/><path d="M17.66 17.66l1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/></svg>`;
          case 'moon':
            return html`<svg ${common} viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79Z"/></svg>`;
          case 'github':
            return html`<svg ${common} viewBox="0 0 24 24"><path d="M9 19c-4 1.5-4-2.5-5-3"/><path d="M14 22v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 18 3.77 5.07 5.07 0 0 0 17.91 1S16.73.65 14 2.48a13.38 13.38 0 0 0-5 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 3.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>`;
          case 'linkedin':
            return html`<svg ${common} viewBox="0 0 24 24"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6Z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>`;
          case 'mail':
            return html`<svg ${common} viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>`;
          default:
            return null;
        }
      }

      function Badge(props) {
        return html`<span className=${cn(
          'inline-flex items-center rounded-full border px-3 py-1 text-xs font-medium',
          'border-slate-200 bg-white/60 text-slate-700',
          'dark:border-slate-700 dark:bg-slate-900/50 dark:text-slate-200',
          props.className
        )}>${props.children}</span>`;
      }

      function Button(props) {
        const { href, onClick, variant = 'primary', className, children } = props;
        const base = 'inline-flex items-center justify-center gap-2 rounded-xl px-4 py-2 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-slate-400/30 focus:ring-offset-2 focus:ring-offset-white dark:focus:ring-slate-500/40 dark:focus:ring-offset-slate-950';
        const styles = {
          primary: 'bg-slate-900 text-white hover:bg-slate-800 dark:bg-white dark:text-slate-900 dark:hover:bg-slate-100',
          secondary: 'bg-white/70 text-slate-900 hover:bg-white border border-slate-200 dark:bg-slate-900/50 dark:text-slate-100 dark:border-slate-700 dark:hover:bg-slate-900',
          ghost: 'text-slate-700 hover:bg-slate-100/70 dark:text-slate-200 dark:hover:bg-slate-900/50',
        };
        if (href) {
          const external = isExternalHref(href);
          return html`<a href=${href} target=${external ? '_blank' : undefined} rel=${external ? 'noreferrer noopener' : undefined} className=${cn(base, styles[variant], className)}>${children}</a>`;
        }
        return html`<button type="button" onClick=${onClick} className=${cn(base, styles[variant], className)}>${children}</button>`;
      }

      function Container(props) {
        return html`<div className=${cn('mx-auto w-full max-w-6xl px-4 sm:px-6 lg:px-8', props.className)}>${props.children}</div>`;
      }

      function Section(props) {
        return html`<section id=${props.id} className=${cn('scroll-mt-24 py-16 sm:py-20', props.className)}>
          <${Container}>
            <div className="reveal">
              ${props.children}
            </div>
          </${Container}>
        </section>`;
      }

                    </p>

                    <div className="mt-6 flex flex-wrap items-center gap-3">
                      <${Button} href="#projects" variant="primary">

                      <${Button} href=${profile.github} variant="secondary" className="" >
                        <${Icon} name="github" className="h-4 w-4" />
                        GitHub
                      </${Button}>
                      <${Button} href=${profile.linkedin} variant="secondary" >

                    <div className="mt-8 flex flex-wrap gap-2">

                    </div>
                  </div>

                  <div className="reveal">
                    <div className="glass relative rounded-3xl border border-slate-200 p-6 shadow-soft backdrop-blur dark:border-slate-800">
                      <div className="absolute -right-8 -top-8 h-28 w-28 rounded-3xl bg-gradient-to-br from-sky-300/60 to-indigo-300/40 blur-2xl dark:from-sky-400/15 dark:to-indigo-400/10"></div>
                      <div className="relative">
                        <div className="flex items-center justify-between">
                          <div>
                            <p className="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400">Current focus</p>
                            <p className="mt-2 text-lg font-bold text-slate-900 dark:text-white">Full Stack + AI/ML</p>
                          </div>
                          <div className="animate-floaty grid h-12 w-12 place-items-center rounded-2xl bg-slate-900 text-white dark:bg-white dark:text-slate-900">
                            <span className="text-lg font-black">⚡</span>
                          </div>
                        </div>

                        <div className="mt-6 grid gap-3">
                          ${profile.metrics.map((m) => html`
                            <div key=${m.label} className="flex items-center justify-between rounded-2xl border border-slate-200 bg-white/60 px-4 py-3 dark:border-slate-800 dark:bg-slate-950/40">
                              <span className="text-sm font-medium text-slate-700 dark:text-slate-200">${m.label}</span>
                              <span className="text-sm font-semibold text-slate-900 dark:text-white">${m.value}</span>
                            </div>
                          `)}
                        </div>

                        <div className="mt-6 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white dark:bg-white dark:text-slate-900">
                          <span className="opacity-80">Email:</span>
                          <span className="ml-2 font-semibold">${profile.email}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </${Container}>
            </section>
          </div>
        `;
      }

      function About(props) {
        const { skills, paragraphs } = props;
        return html`
          <${Section} id="about">
            <div className="grid gap-10 lg:grid-cols-2">
              <div>
                <h2 className="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl dark:text-white">About</h2>
                <div className="mt-4 space-y-4 text-slate-700 dark:text-slate-200">
                  ${paragraphs.map((p, idx) => html`<p key=${idx} className="leading-relaxed">${p}</p>`)}
                </div>
              </div>
              <div>
                <div className="rounded-3xl border border-slate-200 bg-white/60 p-6 shadow-soft dark:border-slate-800 dark:bg-slate-950/40">
                  <p className="text-sm font-semibold text-slate-900 dark:text-white">Skills</p>
                  <p className="mt-2 text-sm text-slate-600 dark:text-slate-300">Full stack fundamentals + AI/ML tooling for building real products.</p>
                  <div className="mt-5 flex flex-wrap gap-2">
                    ${skills.map((s) => html`<${Badge} key=${s}>${s}</${Badge}>`)}
                  </div>
                </div>
              </div>
            </div>
          </${Section}>
        `;
      }

      function ProjectCard(props) {
        const { project } = props;
        return html`
          <article className="group relative overflow-hidden rounded-3xl border border-slate-200 bg-white/60 p-6 shadow-soft transition hover:-translate-y-0.5 hover:bg-white dark:border-slate-800 dark:bg-slate-950/40 dark:hover:bg-slate-950">
            <div className="absolute -right-24 -top-24 h-48 w-48 rounded-full bg-gradient-to-br from-sky-200/70 to-indigo-200/40 blur-3xl opacity-0 transition group-hover:opacity-100 dark:from-sky-400/10 dark:to-indigo-400/10"></div>
            <div className="relative">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <h3 className="text-lg font-bold text-slate-900 dark:text-white">${project.name}</h3>
                  <p className="mt-2 text-sm leading-relaxed text-slate-700 dark:text-slate-200">${project.description}</p>
                </div>
                ${project.featured ? html`<span className="shrink-0 rounded-full bg-slate-900 px-3 py-1 text-xs font-semibold text-white dark:bg-white dark:text-slate-900">Featured</span>` : null}
              </div>

              <div className="mt-4 flex flex-wrap gap-2">
                ${project.stack.map((t) => html`<${Badge} key=${t} className="bg-white/40">${t}</${Badge}>`)}
              </div>

              <div className="mt-6 flex flex-wrap items-center gap-3">
                ${project.live ? html`<${Button} href=${project.live} variant="primary" className="">Live <${Icon} name="arrow" className="h-4 w-4" /></${Button}>` : null}
                ${project.repo ? html`<${Button} href=${project.repo} variant="secondary"><${Icon} name="github" className="h-4 w-4" />Repo</${Button}>` : null}
              </div>
            </div>
          </article>
        `;
      }

      function Projects(props) {
        const { projects } = props;
        const [active, setActive] = useState('all');

        const tagLabels = useMemo(
          () => ({
            all: 'All',
            fullstack: 'Full Stack',
            ml: 'ML',
          }),
          []
        );

        const tags = useMemo(() => {
          return ['all', 'fullstack', 'ml'];
        }, [projects]);

        const filtered = useMemo(() => {
          if (active === 'all') return projects;
          return projects.filter((p) => p.tags.includes(active));
        }, [projects, active]);

        return html`
          <${Section} id="projects">
            <div className="flex flex-col gap-6 sm:flex-row sm:items-end sm:justify-between">
              <div>
                <h2 className="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl dark:text-white">Projects</h2>
                <p className="mt-2 max-w-2xl text-sm leading-relaxed text-slate-700 dark:text-slate-200">A selection of full stack and AI/ML work—built to be reliable, maintainable, and user-friendly.</p>
              </div>
              <div className="flex flex-wrap gap-2">
                ${tags.map((t) => html`
                  <button
                    key=${t}
                    type="button"
                    onClick=${() => setActive(t)}
                    className=${cn(
                      'rounded-full border px-3 py-1 text-xs font-semibold transition',
                      active === t
                        ? 'border-slate-900 bg-slate-900 text-white dark:border-white dark:bg-white dark:text-slate-900'
                        : 'border-slate-200 bg-white/50 text-slate-700 hover:bg-white dark:border-slate-800 dark:bg-slate-950/30 dark:text-slate-200 dark:hover:bg-slate-950/60'
                    )}
                  >
                    ${tagLabels[t] || t}
                  </button>
                `)}
              </div>
            </div>

            <div className="mt-10 grid gap-6 md:grid-cols-2">
              ${filtered.map((p) => html`<div key=${p.name} className="reveal"><${ProjectCard} project=${p} /></div>`)}
            </div>
          </${Section}>
        `;
      }

      function Contact(props) {
        const { email } = props;
        const [copied, setCopied] = useState(false);
        const timerRef = useRef(null);

        useEffect(() => () => {
          if (timerRef.current) clearTimeout(timerRef.current);
        }, []);

        async function copyEmail() {
          try {
            await navigator.clipboard.writeText(email);
            setCopied(true);
            if (timerRef.current) clearTimeout(timerRef.current);
            timerRef.current = setTimeout(() => setCopied(false), 1400);
          } catch (e) {
            window.location.href = 'mailto:' + email;
          }
        }

        return html`
          <${Section} id="contact" className="pb-24">
            <div>
              <h2 className="text-2xl font-bold tracking-tight text-slate-900 sm:text-3xl dark:text-white">Contact</h2>
              <p className="mt-3 max-w-xl text-sm leading-relaxed text-slate-700 dark:text-slate-200">
                Want to collaborate on a full stack project or an AI/ML idea? Send a message and I’ll respond as soon as possible.
              </p>
              <div className="mt-6 flex flex-wrap items-center gap-3">
                <${Button} href=${'mailto:' + email} variant="primary">
                  <${Icon} name="mail" className="h-4 w-4" />
                  Email me
                </${Button}>
                <${Button} variant="secondary" onClick=${copyEmail}>
                  Copy email
                  <span className=${cn('ml-1 text-xs font-semibold', copied ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-500 dark:text-slate-400')}>
                    ${copied ? 'Copied' : ''}
                  </span>
                </${Button}>
                <${Button} href=${props.github} variant="secondary">
                  <${Icon} name="github" className="h-4 w-4" />
                  GitHub
                </${Button}>
                <${Button} href=${props.linkedin} variant="secondary">
                  <${Icon} name="linkedin" className="h-4 w-4" />
                  LinkedIn
                </${Button}>
              </div>
            </div>
          </${Section}>
        `;
      }

      function Footer() {
        const year = new Date().getFullYear();
        return html`
          <footer className="border-t border-slate-200/60 py-10 text-sm text-slate-600 dark:border-slate-800/60 dark:text-slate-300">
            <${Container}>
              <div className="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <p>© ${year} Akhil Ananthula. All rights reserved.</p>
                <p className="text-slate-500 dark:text-slate-400">Built with React + Tailwind (static, no build tools).</p>
              </div>
            </${Container}>
          </footer>
        `;
      }

      function App() {
        useRevealOnScroll();
        const { theme, setTheme } = useTheme();

        const profile = useMemo(
          () => ({
            name: 'Akhil Ananthula',
            role: 'Full Stack Developer • AI/ML',
            location: 'Hyderabad (Gachibowli)',
            email: 'akhilkumar4788@gmail.com',
            github: 'https://github.com/Akhil4007-cpu',
            linkedin: 'https://www.linkedin.com/in/akhila77',
            highlights: ['B.Tech student', 'Full Stack', 'AI/ML', 'Python'],
            metrics: [
              { label: 'Focus', value: 'Web + ML' },
              { label: 'Stack', value: 'React / Node / Python' },
              { label: 'Location', value: 'Hyderabad' },
            ],
          }),
          []
        );

        const skills = useMemo(
          () => [
            'JavaScript',
            'TypeScript',
            'React',
            'Node.js',
            'Express',
            'REST APIs',
            'MongoDB',
            'PostgreSQL',
            'SQL',
            'Authentication (JWT)',
            'Git & GitHub',
            'Docker (basics)',
            'Python',
            'Machine Learning',
            'Deep Learning',
            'Computer Vision',
            'NumPy',
            'Pandas',
            'scikit-learn',
            'TensorFlow / PyTorch',
          ],
